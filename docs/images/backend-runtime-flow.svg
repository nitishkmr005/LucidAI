<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="920" viewBox="0 0 1200 920" role="img" aria-labelledby="title desc">
  <title id="title">NeuroTalk high-level backend flow</title>
  <desc id="desc">A static flowchart showing transport routing, VAD, STT, orchestration, intent routing, TTS, document events, and client event delivery.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 14; }
      .branch { fill: #1e293b; stroke: #64748b; stroke-width: 2; rx: 14; }
      .io { fill: #0f766e; stroke: #5eead4; stroke-width: 2; rx: 14; }
      .svc { fill: #1d4ed8; stroke: #93c5fd; stroke-width: 2; rx: 14; }
      .store { fill: #7c3aed; stroke: #c4b5fd; stroke-width: 2; rx: 14; }
      .event { fill: #92400e; stroke: #fcd34d; stroke-width: 2; rx: 14; }
      .text { fill: #e5e7eb; font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 600; }
      .small { fill: #cbd5e1; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .label { fill: #94a3b8; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; }
      .arrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 8 8; }
      .legend-text { fill: #cbd5e1; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="920"/>

  <text x="60" y="60" class="text" style="font-size:32px;">High-Level Backend Flow</text>
  <text x="60" y="95" class="small">Static SVG fallback for README preview environments that do not render Mermaid.</text>

  <rect x="840" y="36" width="300" height="74" class="panel"/>
  <rect x="862" y="58" width="16" height="16" class="io"/>
  <text x="888" y="71" class="legend-text">Client input / UI action</text>
  <rect x="862" y="82" width="16" height="16" class="svc"/>
  <text x="888" y="95" class="legend-text">Backend service / orchestrator</text>
  <rect x="1000" y="58" width="16" height="16" class="store"/>
  <text x="1026" y="71" class="legend-text">Persisted store / state</text>
  <rect x="1000" y="82" width="16" height="16" class="event"/>
  <text x="1026" y="95" class="legend-text">Client-facing event</text>

  <rect x="60" y="130" width="210" height="72" class="io"/>
  <text x="165" y="174" class="text" text-anchor="middle">Browser Mic / UI</text>

  <rect x="340" y="130" width="240" height="72" class="svc"/>
  <text x="460" y="174" class="text" text-anchor="middle">FastAPI Entrypoint</text>

  <rect x="650" y="120" width="230" height="92" class="branch"/>
  <text x="765" y="158" class="label" text-anchor="middle">TRANSPORT</text>
  <text x="765" y="188" class="text" text-anchor="middle">WebRTC or WebSocket</text>

  <rect x="950" y="80" width="190" height="72" class="svc"/>
  <text x="1045" y="124" class="text" text-anchor="middle">WebRTC Session</text>

  <rect x="950" y="170" width="190" height="72" class="svc"/>
  <text x="1045" y="214" class="text" text-anchor="middle">WebSocket Session</text>

  <rect x="950" y="290" width="190" height="72" class="svc"/>
  <text x="1045" y="334" class="text" text-anchor="middle">Streaming VAD</text>

  <rect x="950" y="400" width="190" height="72" class="svc"/>
  <text x="1045" y="444" class="text" text-anchor="middle">STT Service</text>

  <rect x="950" y="510" width="190" height="72" class="svc"/>
  <text x="1045" y="554" class="text" text-anchor="middle">Turn Orchestrator</text>

  <rect x="610" y="510" width="250" height="72" class="branch"/>
  <text x="735" y="554" class="text" text-anchor="middle">Intent Routing</text>

  <rect x="60" y="650" width="200" height="72" class="svc"/>
  <text x="160" y="694" class="text" text-anchor="middle">LLM Service</text>

  <rect x="300" y="650" width="200" height="72" class="store"/>
  <text x="400" y="694" class="text" text-anchor="middle">Document Store</text>

  <rect x="540" y="650" width="220" height="72" class="svc"/>
  <text x="650" y="694" class="text" text-anchor="middle">Reading State Machine</text>

  <rect x="800" y="650" width="280" height="72" class="svc"/>
  <text x="940" y="694" class="text" text-anchor="middle">Annotation + Export</text>

  <rect x="410" y="770" width="190" height="72" class="svc"/>
  <text x="505" y="814" class="text" text-anchor="middle">TTS Service</text>

  <rect x="610" y="770" width="240" height="102" class="event"/>
  <text x="730" y="806" class="label" text-anchor="middle">PLAYBACK EVENTS</text>
  <text x="730" y="834" class="small" text-anchor="middle">tts_audio</text>
  <text x="730" y="856" class="small" text-anchor="middle">tts_done, tts_interrupted</text>

  <rect x="880" y="770" width="250" height="102" class="event"/>
  <text x="1005" y="806" class="label" text-anchor="middle">DOCUMENT EVENTS</text>
  <text x="1005" y="834" class="small" text-anchor="middle">doc_read_start, doc_highlight</text>
  <text x="1005" y="856" class="small" text-anchor="middle">doc_note_saved, doc_export</text>

  <line x1="270" y1="166" x2="340" y2="166" class="arrow"/>
  <line x1="580" y1="166" x2="650" y2="166" class="arrow"/>
  <line x1="880" y1="145" x2="950" y2="116" class="arrow"/>
  <line x1="880" y1="187" x2="950" y2="206" class="arrow"/>
  <line x1="1045" y1="152" x2="1045" y2="290" class="arrow"/>
  <line x1="1045" y1="242" x2="1045" y2="290" class="arrow dashed"/>
  <line x1="1045" y1="362" x2="1045" y2="400" class="arrow"/>
  <line x1="1045" y1="472" x2="1045" y2="510" class="arrow"/>
  <line x1="950" y1="546" x2="860" y2="546" class="arrow"/>

  <line x1="735" y1="582" x2="160" y2="650" class="arrow"/>
  <line x1="735" y1="582" x2="400" y2="650" class="arrow"/>
  <line x1="735" y1="582" x2="650" y2="650" class="arrow"/>
  <line x1="735" y1="582" x2="940" y2="650" class="arrow"/>

  <line x1="160" y1="722" x2="458" y2="770" class="arrow"/>
  <line x1="400" y1="722" x2="505" y2="770" class="arrow"/>
  <line x1="650" y1="722" x2="552" y2="770" class="arrow"/>

  <line x1="600" y1="806" x2="610" y2="806" class="arrow"/>
  <line x1="500" y1="650" x2="930" y2="770" class="arrow dashed"/>
  <line x1="940" y1="722" x2="940" y2="770" class="arrow"/>

  <text x="890" y="109" class="small">default</text>
  <text x="892" y="198" class="small">fallback</text>
</svg>
