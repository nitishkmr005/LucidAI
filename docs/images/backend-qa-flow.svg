<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">NeuroTalk backend Q and A flow</title>
  <desc id="desc">A static sequence diagram showing audio entering the session, VAD, STT, LLM processing, TTS synthesis, and client events.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .lane { stroke: #334155; stroke-width: 2; }
      .head { fill: #1e293b; stroke: #64748b; stroke-width: 2; rx: 12; }
      .text { fill: #e5e7eb; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 600; }
      .small { fill: #cbd5e1; font-family: Arial, Helvetica, sans-serif; font-size: 19px; }
      .msg { stroke: #93c5fd; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .return { stroke: #fcd34d; stroke-width: 3; fill: none; marker-end: url(#arrowhead); stroke-dasharray: 8 7; }
      .note { fill: #111827; stroke: #475569; stroke-width: 1.5; rx: 10; }
      .legend-text { fill: #cbd5e1; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 600; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#cbd5e1"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="900"/>
  <text x="50" y="58" class="text" style="font-size:32px;">Backend Q&amp;A Flow</text>
  <text x="50" y="92" class="small">User audio becomes transcript, transcript becomes an answer, and the answer streams back as text and speech.</text>

  <rect x="820" y="34" width="320" height="78" class="note"/>
  <text x="844" y="59" class="legend-text">Blue arrows = forward request flow</text>
  <text x="844" y="83" class="legend-text">Amber dashed arrows = returned result</text>
  <text x="844" y="107" class="legend-text">Session emits client events during LLM and TTS</text>

  <rect x="50" y="130" width="140" height="56" class="head"/>
  <rect x="240" y="130" width="140" height="56" class="head"/>
  <rect x="430" y="130" width="140" height="56" class="head"/>
  <rect x="620" y="130" width="140" height="56" class="head"/>
  <rect x="810" y="130" width="140" height="56" class="head"/>
  <rect x="1000" y="130" width="140" height="56" class="head"/>

  <text x="120" y="165" class="text" text-anchor="middle">User Audio</text>
  <text x="310" y="165" class="text" text-anchor="middle">Session</text>
  <text x="500" y="165" class="text" text-anchor="middle">VAD</text>
  <text x="690" y="165" class="text" text-anchor="middle">Whisper STT</text>
  <text x="880" y="165" class="text" text-anchor="middle">LLM</text>
  <text x="1070" y="165" class="text" text-anchor="middle">TTS</text>

  <line x1="120" y1="205" x2="120" y2="850" class="lane"/>
  <line x1="310" y1="205" x2="310" y2="850" class="lane"/>
  <line x1="500" y1="205" x2="500" y2="850" class="lane"/>
  <line x1="690" y1="205" x2="690" y2="850" class="lane"/>
  <line x1="880" y1="205" x2="880" y2="850" class="lane"/>
  <line x1="1070" y1="205" x2="1070" y2="850" class="lane"/>

  <path d="M130 250 H300" class="msg"/>
  <text x="215" y="238" class="small" text-anchor="middle">PCM / RTP frames</text>

  <path d="M320 320 H490" class="msg"/>
  <text x="405" y="308" class="small" text-anchor="middle">stream frames</text>

  <path d="M500 390 H320" class="return"/>
  <text x="410" y="378" class="small" text-anchor="middle">speech start / end</text>

  <path d="M320 460 H680" class="msg"/>
  <text x="500" y="448" class="small" text-anchor="middle">buffered speech</text>

  <path d="M690 530 H320" class="return"/>
  <text x="505" y="518" class="small" text-anchor="middle">transcript</text>

  <path d="M320 600 H870" class="msg"/>
  <text x="595" y="588" class="small" text-anchor="middle">transcript + context</text>

  <path d="M880 670 H320" class="return"/>
  <text x="600" y="658" class="small" text-anchor="middle">decision + user-facing answer</text>

  <path d="M320 740 H1060" class="msg"/>
  <text x="690" y="728" class="small" text-anchor="middle">response text</text>

  <path d="M1070 810 H320" class="return"/>
  <text x="695" y="798" class="small" text-anchor="middle">sentence audio chunks</text>

  <rect x="54" y="620" width="190" height="128" class="note"/>
  <text x="139" y="650" class="small" text-anchor="middle">Client-facing events</text>
  <text x="139" y="680" class="small" text-anchor="middle">from Session:</text>
  <text x="139" y="708" class="small" text-anchor="middle">llm_start</text>
  <text x="139" y="732" class="small" text-anchor="middle">llm_partial</text>
  <text x="139" y="756" class="small" text-anchor="middle">llm_final</text>
  <text x="139" y="780" class="small" text-anchor="middle">tts_start / tts_audio</text>
  <text x="139" y="804" class="small" text-anchor="middle">tts_done / tts_interrupted</text>
</svg>
